<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Localização de Estágio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS para o Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }

        header {
            padding: 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
        }

        #map {
            flex: 1;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .leaflet-popup-content-wrapper {
            background: #222;
            color: #fff;
            border-radius: 8px;
        }
        .leaflet-popup-tip {
            background: #222;
        }
    </style>
</head>
<body>

    <header>
        <h1>📍 Painel do Professor: Localizações Registradas</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Os registros atualizam quando você recarrega a página.</p>
    </header>

    <!-- Container do Mapa -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa o mapa centralizado no Brasil
        const map = L.map('map').setView([-14.2350, -51.9253], 4);

        // Adiciona a camada visual do OpenStreetMap (Grátis e sem chave de API)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Busca as localizações na API e plota no mapa
        async function carregarLocalizacoes() {
            try {
                const response = await fetch('/api/localizacoes');
                const localizacoes = await response.json();

                if (localizacoes.length === 0) {
                    return;
                }

                // Cria um grupo para agrupar todos os pinos e ajustar o zoom depois
                const latLngs = [];

                localizacoes.forEach(loc => {
                    const textoPopup = `
                        <b>Matrícula:</b> ${loc.matricula}<br>
                        <b>Data/Hora:</b> ${loc.hora}<br>
                        <b>Precisão GPS:</b> ${Math.round(loc.precisao_metros)} metros
                    `;
                    
                    const marker = L.marker([loc.latitude, loc.longitude]).addTo(map);
                    marker.bindPopup(textoPopup);
                    
                    // Se quisermos mostrar o raio de precisão:
                    L.circle([loc.latitude, loc.longitude], {
                        color: 'blue',
                        fillColor: '#30f',
                        fillOpacity: 0.1,
                        radius: loc.precisao_metros
                    }).addTo(map);

                    latLngs.push([loc.latitude, loc.longitude]);
                });

                // Ajusta a câmera do mapa para focar em todos os pinos registrados
                if (latLngs.length > 0) {
                    map.fitBounds(latLngs, { padding: [50, 50] });
                }

            } catch (error) {
                console.error("Erro ao buscar localizações:", error);
            }
        }

        // Roda a função quando a página carrega
        window.onload = carregarLocalizacoes;
    </script>
</body>
</html>
